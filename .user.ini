; Project-level PHP overrides for uploads
; Increase these values as needed or implement chunked uploads for unlimited sizes
upload_max_filesize = 10240M
post_max_size = 10240M
memory_limit = 20480M
max_execution_time = 0
max_input_time = 0
file_uploads = On

; Note: Some environments (FPM/nginx/apache) require server config changes
; or a restart to apply these values. For truly unlimited-size uploads,
; implement resumable/chunked uploads (tus, Dropzone chunking, or Pion package).
