services:
  - type: web
    name: tourism-booking-system
    env: docker
    dockerfilePath: Dockerfile
    branch: main
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: tourism-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tourism-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: tourism-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tourism-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tourism-db
          property: password
      - key: RUN_MIGRATIONS
        value: true
      - key: RUN_SEEDS
        value: false
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CORS_ALLOW_ORIGIN
        value: "*"

databases:
  - name: tourism-db
    databaseName: tourism_booking
    user: tourism_user
    plan: free
